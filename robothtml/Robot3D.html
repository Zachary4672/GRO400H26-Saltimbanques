<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Robot 3D par angles</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0f14;
      font-family: Arial, sans-serif;
    }

    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #d9f7ff;
      background: rgba(0, 0, 0, 0.35);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 10;
      white-space: pre-line;
      pointer-events: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="info">Chargement...</div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    const info = document.getElementById("info");

    function getNum(name, fallback) {
      const params = new URLSearchParams(window.location.search);
      const v = Number(params.get(name));
      return Number.isFinite(v) ? v : fallback;
    }

    function degToRad(deg) {
      return deg * Math.PI / 180;
    }

    function radToDeg(rad) {
      return rad * 180 / Math.PI;
    }

    // =========================
    // Paramètres URL
    // Exemple :
    // ?j1=0&j2=30&j3=-20&L1=0.195&L2=0.185&L3=0.05
    // =========================


    const j1 = getNum("j1", 0);
    const j2 = getNum("j2", 0);
    const j3 = getNum("j3", 0);

    const L1 = getNum("L1", 0.195);
    const L2 = getNum("L2", 0.185);
    const L3 = getNum("L3", 0.05);


    // =========================
    // Scène Three.js
    // =========================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b0f14);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.01,
      100
    );

    // IMPORTANT : Z vertical
    camera.up.set(0, 0, 1);
    camera.position.set(0.6, -0.6, 0.45);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0xffffff, 0.9);
    scene.add(ambient);

    const dir1 = new THREE.DirectionalLight(0xffffff, 0.9);
    dir1.position.set(1, -1, 1.5);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0xffffff, 0.35);
    dir2.position.set(-1, 1, 0.8);
    scene.add(dir2);

    // Grille dans le plan XY
    const grid = new THREE.GridHelper(2, 20, 0x446677, 0x223344);
    grid.rotation.x = Math.PI / 2;
    scene.add(grid);

    const axes = new THREE.AxesHelper(0.15);
    scene.add(axes);

    const robotGroup = new THREE.Group();
    scene.add(robotGroup);

    // =========================
    // Cinématique
    // Compatible avec :
    // Rz(j1) puis Ry(theta)
    // theta = j2 pour L1
    // theta = j2 + j3 pour L2
    // L3 toujours vers le sol -> -Z
    // =========================
function worldVectorFromYawPitch(length, yawZ, pitchY) {
  return new THREE.Vector3(
    length * Math.cos(pitchY) * Math.cos(yawZ),
    length * Math.cos(pitchY) * Math.sin(yawZ),
    length * Math.sin(pitchY)
  );
}

    function computePoints() {
      const p0 = new THREE.Vector3(0, 0, 0);

      const v1 = worldVectorFromYawPitch(L1, j1, j2);
      const p1 = p0.clone().add(v1);

      const v2 = worldVectorFromYawPitch(L2, j1, j2 + j3);
      const p2 = p1.clone().add(v2);

      // Outil toujours vers le bas du monde
      const v3 = new THREE.Vector3(0, 0, -L3);
      const p3 = p2.clone().add(v3);

      return [p0, p1, p2, p3];
    }

    // =========================
    // Visuel
    // =========================
    function makeJointSphere(position, color, radius = 0.015) {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(radius, 24, 24),
        new THREE.MeshStandardMaterial({
          color,
          metalness: 0.15,
          roughness: 0.45
        })
      );
      mesh.position.copy(position);
      return mesh;
    }

    function makeCylinderBetweenPoints(a, b, radius = 0.008, color = 0x7fffd4) {
      const dir = new THREE.Vector3().subVectors(b, a);
      const len = dir.length();

      const geom = new THREE.CylinderGeometry(radius, radius, len, 20);
      const mat = new THREE.MeshStandardMaterial({
        color,
        metalness: 0.12,
        roughness: 0.5
      });

      const cyl = new THREE.Mesh(geom, mat);

      const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
      cyl.position.copy(mid);

      // cylindre orienté selon Y par défaut
      const yAxis = new THREE.Vector3(0, 1, 0);
      const dirNorm = dir.clone().normalize();
      const quat = new THREE.Quaternion().setFromUnitVectors(yAxis, dirNorm);
      cyl.quaternion.copy(quat);

      return cyl;
    }

    function fitCameraToPoints(points) {
      const box = new THREE.Box3().setFromPoints(points);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());

      const maxDim = Math.max(size.x, size.y, size.z, 0.15);
      const distance = maxDim * 2.8;

      controls.target.copy(center);
      camera.position.set(
        center.x + distance,
        center.y - distance,
        center.z + distance * 0.75
      );

      camera.near = 0.01;
      camera.far = Math.max(10, distance * 20);
      camera.updateProjectionMatrix();
      controls.update();
    }

    function clearRobot() {
      while (robotGroup.children.length > 0) {
        const child = robotGroup.children[0];
        robotGroup.remove(child);

        if (child.geometry) child.geometry.dispose();

        if (child.material) {
          if (Array.isArray(child.material)) {
            child.material.forEach(m => m.dispose());
          } else {
            child.material.dispose();
          }
        }
      }
    }

    function drawRobot(points) {
      clearRobot();

      const [p0, p1, p2, p3] = points;

      const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
      const lineMaterial = new THREE.LineBasicMaterial({ color: 0x7fffd4 });
      const line = new THREE.Line(lineGeometry, lineMaterial);
      robotGroup.add(line);

      robotGroup.add(makeCylinderBetweenPoints(p0, p1, 0.010, 0x4fd1c5));
      robotGroup.add(makeCylinderBetweenPoints(p1, p2, 0.009, 0x63b3ed));
      robotGroup.add(makeCylinderBetweenPoints(p2, p3, 0.008, 0xf6ad55));

      robotGroup.add(makeJointSphere(p0, 0x00ff88, 0.020));
      robotGroup.add(makeJointSphere(p1, 0x7cc7ff, 0.017));
      robotGroup.add(makeJointSphere(p2, 0x7cc7ff, 0.017));
      robotGroup.add(makeJointSphere(p3, 0xffc857, 0.020));

      fitCameraToPoints(points);

      info.textContent =
        `Angles (deg)\n` +
        `j1 = ${j1.toFixed(2)}\n` +
        `j2 = ${j2.toFixed(2)}\n` +
        `j3 = ${j3.toFixed(2)}\n\n` +
        `Base = (${p0.x.toFixed(3)}, ${p0.y.toFixed(3)}, ${p0.z.toFixed(3)})\n` +
        `E1   = (${p1.x.toFixed(3)}, ${p1.y.toFixed(3)}, ${p1.z.toFixed(3)})\n` +
        `E2   = (${p2.x.toFixed(3)}, ${p2.y.toFixed(3)}, ${p2.z.toFixed(3)})\n` +
        `EE   = (${p3.x.toFixed(3)}, ${p3.y.toFixed(3)}, ${p3.z.toFixed(3)})`;
    }

    const points = computePoints();
    drawRobot(points);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
